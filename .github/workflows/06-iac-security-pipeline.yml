name: IaC Security Pipeline (Terraform + Terrascan)
on:
  workflow_call:
env:
  TF_VERSION: 1.6.6
  TERRAFORM_DIR: ./terraform

jobs:

# -----------------------------
# 1. Lint + Format Check
# -----------------------------
  IaC-linting:
    name: Terraform Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}


# -----------------------------
# 2. Terrascan Security Scan
# -----------------------------
  terrascan:
    name: Terrascan IaC Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: terraform
          iac_version: v14
          policy_type: aws
          only_warn: false
          sarif_upload: true
          iac_dir: ${{ env.TERRAFORM_DIR }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terrascan.sarif


# -----------------------------
# 3. Terraform Plan
# -----------------------------
  TF-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terrascan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TERRAFORM_DIR }}/tfplan


# -----------------------------
# 4. Terraform Apply (manual approval recommended)
# -----------------------------
  TF-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main'

    environment:
      name: production   # 👈 adds GitHub approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TERRAFORM_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}
